<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>viewer-core — first-party demo</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  /* The page owns the box. The canvas fills whatever container you give it —
     size it with CSS like any element; the viewer renders responsively into it. */
  #stage{position:fixed;inset:0}
  #stage>canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
  <!-- This is the copy-pattern for the Astro Mission component (a client island):
       one <canvas>, import { createViewer }, call resize() from a ResizeObserver. -->
  <div id="stage"><canvas id="view"></canvas></div>

  <script type="module">
    import { createViewer } from './viewer-core.js';

    const stage  = document.getElementById('stage');
    const canvas = document.getElementById('view');

    // Live tuning knobs (handy for finding the right framing/placement for a tall backdrop):
    //   ?zoom=0.5  overall scale (uniform — scales orbits AND bodies/strokes together)
    //   ?cy=0.7    vertical placement 0..1 (0.5 = centre; higher drops the scene lower)
    //   ?cx=0.5    horizontal placement 0..1
    const q = new URLSearchParams(location.search);
    const num = (k, d) => (q.has(k) ? parseFloat(q.get(k)) : d);

    // Defaults tuned in moon3.html get pasted here as plain config — no URL params needed.
    // This set reproduces moon3.html?embed=1 (the "moon4" look): Mission preset, zoom 0.8.
    const viewer = createViewer(canvas, {
      // Backdrop default = non-interactive (matches the site). Add ?i=1 to the URL to
      // drag-rotate / scroll-zoom for tuning. The Astro island would keep this false.
      interactive: (q.get('i') === '1' || q.get('interactive') === '1'),
      zoom: num('zoom', 0.8),      // framing multiplier (the old embed default)
      cx:   num('cx', 0.5),        // scene centre X (fraction of width)
      cy:   num('cy', 0.5),        // scene centre Y (fraction of height) — 0.7 = lower gap
      markScale: num('markScale', 1),  // depot/rocket/drone dot size multiplier — e.g. 0.4 for small dots on a backdrop
      labelScale: num('labelScale', 1),// body-label font multiplier (default 1). Labels also track markScale gently, so on a small-dot backdrop they shrink too; nudge this up if they read too small.
      labels: (q.get('labels') === '1'),                                   // ?labels=1 → show OTV / Tanker / Depot / Earth / Moon labels
      labelSet: q.get('labelSet') ? q.get('labelSet').split(',') : null,   // ?labelSet=otv,moon → pick which
      P: {                         // Mission preset (from PRESETS.mission)
        mode: 'mission', primary: 'earth',
        alt: 420, e: 0, inc: 20, mag: 8, span: 8,
        raise: 3, coast: 1, periodMul: 34,
        animDur: 60, roundTrip: true, sun: false
      }
      // S: { earth:'#5C8CFF', sat:'#EAF1FF', ... }  // color/style overrides go here
    });

    // Keep the canvas sized to its container. This is the whole "aspect problem" gone:
    // the page decides the box; the viewer just fits it.
    const fit = () => viewer.resize(stage.clientWidth, stage.clientHeight);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(stage);
    else window.addEventListener('resize', fit);
    fit();

    // Optional niceties an Astro island would add:
    //   document.addEventListener('visibilitychange', () =>
    //     document.hidden ? viewer.pause() : viewer.play());
    //   onCleanup(() => viewer.destroy());
  </script>
</body>
</html>
