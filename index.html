<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P78 — Orbital Logo Tool</title>
<style>
  :root{--orange:#ff5500;--black:#141615;--ink:#e7e9e3;--panel:#11141a;--line:#222833;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#06080d;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    height:100vh;overflow:hidden;}
  .app{display:flex;height:100vh}
  .rail{width:368px;flex:none;overflow-y:auto;padding:16px 16px 40px;border-right:1px solid var(--line);background:#080a10}
  .railhead{margin-bottom:14px}
  .railhead h1{font-weight:600;font-size:15px;margin:0 0 2px}
  .railhead .sub{font-size:11px;opacity:.45;margin-bottom:10px}
  .railhead .row{margin-top:0}
  .viewport{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;background:#06080d}
  .stage{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#000}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

  details{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:#0b0e14}
  summary{cursor:pointer;padding:10px 12px;font-weight:600;font-size:12px;list-style:none;display:flex;justify-content:space-between;align-items:center}
  summary::-webkit-details-marker{display:none}
  summary::after{content:'▸';opacity:.45}
  details[open] summary::after{content:'▾'}
  .sect{padding:2px 12px 11px;display:flex;flex-direction:column;gap:9px}

  .control{display:flex;flex-direction:column;gap:3px}
  .control label{display:flex;align-items:center;gap:8px;opacity:.75;font-size:11.5px}
  .control label .nm{flex:1}
  /* slim custom slider (~15% smaller than browser default) */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:3px;background:#283140;cursor:pointer;margin:3px 0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--orange);border:none}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--orange);border:none}
  input[type=range]::-moz-range-track{height:4px;border-radius:3px;background:#283140}
  .num{width:64px;text-align:right;color:#ff9a5c;font-weight:600;font-variant-numeric:tabular-nums;
    background:#0c0f15;border:1px solid var(--line);border-radius:5px;padding:2px 6px;font-family:inherit;font-size:12px}

  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px;font-size:12px}
  button{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit}
  button:hover{border-color:#3a4556}
  .row label{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.85}
  .lbl{opacity:.5;font-weight:600;letter-spacing:.03em;text-transform:uppercase;font-size:10px;width:100%}
  select,input[type=text]{font-family:inherit;font-size:12px;background:#0c0f15;color:var(--ink);
    border:1px solid var(--line);border-radius:6px;padding:7px 8px}
  input[type=color]{width:36px;height:30px;padding:0;border:1px solid var(--line);border-radius:6px;background:#0c0f15;cursor:pointer}
  .spacer{flex:1}

  .rec-exit{position:fixed;top:14px;right:16px;z-index:10;display:none;background:rgba(0,0,0,.4);color:#fff;
    border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 12px;font-size:11px;cursor:pointer;backdrop-filter:blur(6px)}
  body.rec .rail{display:none}
  body.rec .viewport{padding:0}
  body.rec .rec-exit{display:block}
</style>
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="railhead">
        <h1>P78 — Orbital Logo Tool</h1>
        <div class="sub">Constellation of satellites on real Keplerian orbits.</div>
        <div class="row">
          <button id="replay">↻ Replay</button>
          <button id="theme">Theme: White on Black</button>
          <button id="rec">⤢ Record</button>
        </div>
      </div>

      <details open><summary>Presets &amp; share</summary>
        <div class="sect">
          <div class="row">
            <select id="psel" style="flex:1"><option value="">— load preset —</option></select>
          </div>
          <div class="row">
            <input type="text" id="pname" placeholder="preset name…" style="flex:1;min-width:90px">
            <button id="psave">Save</button>
            <button id="pdel">Delete</button>
          </div>
          <div class="row"><button id="copylink">🔗 Copy share link</button></div>
        </div>
      </details>

      <details open><summary>Orbit elements</summary>
        <div class="sect"><div id="g-orbit"></div></div>
      </details>

      <details open><summary>Animation</summary>
        <div class="sect">
          <div id="g-anim"></div>
          <div class="row">
            <label><input type="checkbox" id="loop"> Loop</label>
            <label><input type="checkbox" id="sat" checked> Satellites</label>
            <label><input type="checkbox" id="fly" checked> Fly</label>
          </div>
        </div>
      </details>

      <details><summary>Mission sequence</summary>
        <div class="sect">
          <div class="row"><label><input type="checkbox" id="seqmode"> Sequence mode</label></div>
          <div class="row">
            <span class="lbl">Load mission</span>
            <select id="seqpreset" style="flex:1"><option value="">— pick —</option></select>
          </div>
          <div class="row">
            <span class="lbl">Display</span>
            <label><input type="radio" name="seqdisp" id="seqanim" checked> Animated</label>
            <label><input type="radio" name="seqdisp" id="seqlayer"> Layered</label>
          </div>
          <div id="g-seq"></div>
          <div class="row"><span class="lbl">Keyframes (2–8)</span></div>
          <div id="kf-list"></div>
          <div class="row"><button id="kf-add">＋ Add keyframe (capture current)</button></div>
        </div>
      </details>

      <details><summary>View</summary>
        <div class="sect">
          <div id="g-view"></div>
          <div class="row">
            <button id="resetview">⤾ Reset view</button>
            <label><input type="checkbox" id="body"> Body</label>
            <label><input type="checkbox" id="focus"> Focus</label>
            <label><input type="checkbox" id="occlude"> Occlusion</label>
            <label><input type="checkbox" id="stars"> Starfield</label>
            <label><input type="checkbox" id="retro"> Retrograde</label>
          </div>
        </div>
      </details>

      <details><summary>Style &amp; wordmark</summary>
        <div class="sect">
          <div id="g-style"></div>
          <div class="row">
            <span class="lbl">Background</span>
            <label><input type="checkbox" id="cbg"> Custom</label>
            <input type="color" id="bgcolor" value="#000000">
          </div>
          <div class="row">
            <span class="lbl">Line colour</span>
            <label><input type="checkbox" id="lc"> Custom</label>
            <input type="color" id="linecolor" value="#eef0ea">
          </div>
          <div class="row">
            <label><input type="checkbox" id="wm"> Wordmark</label>
            <label><input type="checkbox" id="guides"> Guides</label>
          </div>
          <div class="row">
            <span class="lbl">Wordmark lockup</span>
            <button id="lk-free">Center</button>
            <button id="lk-below">Below</button>
            <button id="lk-right">Right</button>
            <button id="lk-above">Above</button>
          </div>
        </div>
      </details>

      <details><summary>Export</summary>
        <div class="sect">
          <div class="row">
            <select id="aspect" title="Frame aspect ratio">
              <option value="16:10">16:10</option><option value="16:9">16:9</option>
              <option value="1:1">1:1 square</option><option value="4:5">4:5</option><option value="3:2">3:2</option>
            </select>
            <select id="res" title="Export resolution (longest edge)">
              <option value="1024">1024px</option><option value="2048" selected>2048px</option><option value="4096">4096px</option>
            </select>
            <label><input type="checkbox" id="tr"> Transparent</label>
          </div>
          <div class="row">
            <button id="export">⤓ Export PNG</button>
            <button id="exportsvg">⤓ Export SVG</button>
          </div>
          <div class="row">
            <span class="lbl">Animated GIF</span>
            <select id="gsize" title="GIF size (longest edge)">
              <option value="480">480px</option><option value="640" selected>640px</option><option value="800">800px</option>
            </select>
            <select id="gfps" title="GIF frame rate">
              <option value="15">15 fps</option><option value="20" selected>20 fps</option><option value="30">30 fps</option>
            </select>
            <button id="exportgif">⤓ Export GIF</button>
          </div>
          <div class="row">
            <span class="lbl">Video (best quality)</span>
            <button id="exportvid" title="Records the reveal as MP4 (Safari) or WebM (Chrome/Firefox)">⤓ Export video</button>
          </div>
        </div>
      </details>

    </aside>

    <main class="viewport" id="viewport"><div class="stage" id="stage"><canvas id="c"></canvas></div></main>
  </div>
  <button class="rec-exit" id="rec-exit">Exit recording (Esc)</button>

<script src="vendor/gif.js"></script>
<script>
(function(){
  "use strict";
  const TWO_PI=Math.PI*2, D2R=Math.PI/180;
  const $=id=>document.getElementById(id);

  const THEMES={
    whiteBlack:{label:"White on Black",bgTop:"#0d0f12",bgBot:"#000000",line:"#eef0ea",
      satGlow:"#cfe0ff",satCore:"#ffffff",stars:true,nebula:false,glow:true,flat:false},
    brandFlat:{label:"Brand (orange)",bgTop:"#ff5500",bgBot:"#ff5500",line:"#141615",
      satGlow:"#141615",satCore:"#141615",stars:false,nebula:false,glow:false,flat:true},
  };
  const THEME_ORDER=["whiteBlack","brandFlat"];
  let themeKey="whiteBlack";
  const theme=()=>THEMES[themeKey];

  // ---------- controls registry ----------
  const RANGE=[
    {id:'num',  group:'orbit',label:'Satellites',        min:2,max:100,step:1,   val:29,  restart:true},
    {id:'ecc',  group:'orbit',label:'Eccentricity',      min:0,max:0.99,step:0.01,val:0.97},
    {id:'incs', group:'orbit',label:'Inclination spread',min:0,max:90, step:0.5, val:47},
    {id:'incbias',group:'orbit',label:'Inclination spacing bias',min:-1,max:1,step:0.05,val:0.35},
    {id:'raans',group:'orbit',label:'RAAN spread',       min:0,max:180,step:1,   val:29},
    {id:'raanbias',group:'orbit',label:'RAAN spacing bias',min:-1,max:1,step:0.05,val:0},
    {id:'apod', group:'orbit',label:'Apogee direction',  min:0,max:360,step:1,   val:180},
    {id:'apos', group:'orbit',label:'Apogee spread',     min:0,max:720,step:1,   val:55},
    {id:'sizespread',group:'orbit',label:'Size spread',  min:0,max:1,  step:0.02,val:0},
    {id:'dur',  group:'anim', label:'Reveal time',       min:1,max:20, step:0.5, val:3,   restart:true},
    {id:'stagger',group:'anim',label:'Reveal stagger',   min:0,max:1,  step:0.01,val:0},
    {id:'psi',  group:'view', label:'View tilt',         min:-180,max:180,step:1, val:25},
    {id:'roll', group:'view', label:'Roll',              min:-180,max:180,step:1, val:0},
    {id:'scale',group:'view', label:'Scale',             min:0.2,max:3,step:0.05, val:1},
    {id:'bodysize',group:'view',label:'Body size',       min:0.02,max:0.6,step:0.01,val:0.12},
    {id:'lw',   group:'style',label:'Line weight',       min:0.4,max:6,step:0.1,  val:1.6},
    {id:'wmsize',group:'style',label:'Wordmark size',    min:5,max:100,step:1,    val:35},
    {id:'clear', group:'style',label:'Clear space %',    min:0,max:40, step:1,    val:8},
    {id:'seqdwell',group:'seq',label:'Dwell (s)',        min:0,max:5,  step:0.1,  val:0.8},
    {id:'seqtrans',group:'seq',label:'Transition (s)',   min:0.1,max:8,step:0.1,  val:1.5},
  ];
  const CHECKS=['loop','sat','fly','body','occlude','stars','wm','cbg','lc','guides','focus','retro'];

  function afterChange(id){
    if(id==='scale') zoom=parseFloat($('scale').value);
    if(id==='dur'||id==='num') restart();
  }
  RANGE.forEach(c=>{
    const wrap=document.createElement('div');wrap.className='control';
    const lab=document.createElement('label');
    const nm=document.createElement('span');nm.className='nm';nm.textContent=c.label;
    const num=document.createElement('input');num.type='number';num.className='num';num.id=c.id+'-n';
    num.min=c.min;num.max=c.max;num.step=c.step;num.value=c.val;
    lab.appendChild(nm);lab.appendChild(num);
    const rng=document.createElement('input');rng.type='range';rng.id=c.id;
    rng.min=c.min;rng.max=c.max;rng.step=c.step;rng.value=c.val;
    wrap.appendChild(lab);wrap.appendChild(rng);
    $('g-'+c.group).appendChild(wrap);
    rng.addEventListener('input',()=>{num.value=rng.value;afterChange(c.id);});
    num.addEventListener('input',()=>{rng.value=num.value;afterChange(c.id);});
  });
  function setRange(id,val){const r=$(id),n=$(id+'-n');if(r)r.value=val;if(n)n.value=val;if(id==='scale')zoom=parseFloat(val);}

  const durEl=$('dur'),numEl=$('num'),staggerEl=$('stagger'),eccEl=$('ecc'),incsEl=$('incs'),raansEl=$('raans'),
        apodEl=$('apod'),aposEl=$('apos'),psiEl=$('psi'),rollEl=$('roll'),scaleEl=$('scale'),lwEl=$('lw'),wmSizeEl=$('wmsize');
  const loopEl=$('loop'),satEl=$('sat'),flyEl=$('fly'),bodyEl=$('body'),occludeEl=$('occlude'),
        starsEl=$('stars'),wmOnEl=$('wm'),customBgEl=$('cbg'),bgcolorEl=$('bgcolor'),transparentEl=$('tr'),
        customLineEl=$('lc'),linecolorEl=$('linecolor'),guidesEl=$('guides'),focusEl=$('focus'),retroEl=$('retro'),
        raanbiasEl=$('raanbias'),incbiasEl=$('incbias'),sizespreadEl=$('sizespread'),bodysizeEl=$('bodysize'),clearEl=$('clear'),
        aspectEl=$('aspect'),resEl=$('res'),stageEl=$('stage'),viewportEl=$('viewport'),
        gsizeEl=$('gsize'),gfpsEl=$('gfps');
  const lineHex=()=>customLineEl.checked?linecolorEl.value:theme().line;

  // ---------- canvas ----------
  const canvas=$('c');
  let ctx=canvas.getContext('2d');
  let DPR=1,W=0,H=0;
  let panX=0,panY=0,zoom=1;
  let markBox=null,snapX=null,snapY=null,exporting=false;   // alignment helpers

  let wmX=0,wmY=0,wmInit=false,draggingWm=false;
  const WM_ASPECT=364/974;
  const wmImgBlk=new Image(),wmImgWht=new Image();
  wmImgBlk.src='img/p78-blk.svg';wmImgWht.src='img/p78-wht.svg';
  let wmTextBlk='',wmTextWht='';
  fetch('img/p78-blk.svg').then(r=>r.text()).then(t=>{wmTextBlk=t;}).catch(()=>{});
  fetch('img/p78-wht.svg').then(r=>r.text()).then(t=>{wmTextWht=t;}).catch(()=>{});

  function fitStage(){
    const pane=viewportEl.getBoundingClientRect(), GAP=22;
    const ar=aspectEl.value.split(':').map(Number), R=ar[0]/ar[1];
    let w=pane.width-2*GAP, h=w/R;
    if(h>pane.height-2*GAP){h=pane.height-2*GAP;w=h*R;}
    stageEl.style.width=Math.max(40,Math.floor(w))+'px';
    stageEl.style.height=Math.max(40,Math.floor(h))+'px';
  }
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2.5);
    if(!document.body.classList.contains('rec')) fitStage();
    const r=canvas.getBoundingClientRect();
    W=Math.max(2,r.width);H=Math.max(2,r.height);
    canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);buildStarfield();
  }
  window.addEventListener('resize',resize);

  // ---------- world / camera ----------
  const A=1, D=6;
  let BODY=0.12;          // body radius (driven by the Body size slider)
  function viewParams(){return {SCALE:0.3*H*D/A*zoom, AX:W*0.5+panX, AY:H*0.5+panY};}
  function project(vp,X,Y,Z,persp,roll){
    const cr=Math.cos(roll),sr=Math.sin(roll);
    const Xr=X*cr-Y*sr, Yr=X*sr+Y*cr;
    const depth=D-Z*persp;
    return {x:vp.AX+Xr/depth*vp.SCALE, y:vp.AY-Yr/depth*vp.SCALE, Z, sf:vp.SCALE/depth};
  }
  function hidden(X,Y,Z){const r2=X*X+Y*Y;return r2<BODY*BODY && Z<Math.sqrt(BODY*BODY-r2);}

  function keplerPt(a,e,inc,Om,w,nu,psi){
    const p=a*(1-e*e)/(1+e*Math.cos(nu));
    let x=p*Math.cos(nu), y=p*Math.sin(nu), z=0, c,s,a1,b1;
    c=Math.cos(w);s=Math.sin(w); a1=x*c-y*s; b1=x*s+y*c; x=a1;y=b1;
    c=Math.cos(inc);s=Math.sin(inc); a1=y*c-z*s; b1=y*s+z*c; y=a1;z=b1;
    c=Math.cos(Om);s=Math.sin(Om); a1=x*c-y*s; b1=x*s+y*c; x=a1;y=b1;
    c=Math.cos(psi);s=Math.sin(psi);
    return {X:x*c+z*s, Y:y, Z:-x*s+z*c};
  }
  // even spatial sampling: map fraction s∈[0,1] (eccentric anomaly) → true anomaly
  function nuFromFrac(s,e){const E=s*TWO_PI;return 2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2));}
  function trueAnom(M,e){let E=M;for(let k=0;k<6;k++)E=E-(E-e*Math.sin(E)-M)/(1-e*Math.cos(E));
    return 2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2));}

  // orbit-element params that make up a config / keyframe
  const ORBIT_PARAMS=['num','ecc','incs','raans','apod','apos','sizespread','raanbias','incbias'];
  function readParams(){const p={};ORBIT_PARAMS.forEach(id=>p[id]=parseFloat($(id).value));return p;}
  function loadParams(p){ORBIT_PARAMS.forEach(id=>{if(p[id]!=null)setRange(id,p[id]);});}
  function lerpParams(a,b,u){const o={};ORBIT_PARAMS.forEach(id=>o[id]=a[id]+(b[id]-a[id])*u);
    const sa=a.size!=null?a.size:1, sb=b.size!=null?b.size:1; o.size=sa+(sb-sa)*u; return o;}

  function elements(k,N,P){
    const t=N>1?k/(N-1):0.5, u=t-0.5;
    const tw=warp(t,P.raanbias), ti=warp(t,P.incbias);
    return {
      a:   (P.size!=null?P.size:1)*A*(1+P.sizespread*(t-0.5)*1.2),
      e:   P.ecc,
      inc: (ti*P.incs)*D2R,
      Om:  ((tw-0.5)*P.raans)*D2R,
      w:   (P.apod+u*P.apos)*D2R,
    };
  }

  // ---------- helpers ----------
  function smoother(t){t=Math.min(1,Math.max(0,t));return t*t*t*(t*(t*6-15)+10);}
  // spacing bias: gamma remap of the even index. b=0 even; |b|=1 → exponent ~5 (strong bunch)
  function warp(t,b){return Math.pow(Math.min(1,Math.max(0,t)), Math.exp(b*1.609));}
  function hexRGB(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;

  let stars=[];
  function buildStarfield(){stars=[];const n=Math.round((W*H)/9000);let seed=51;
    const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
    for(let k=0;k<n;k++)stars.push({x:rnd()*W,y:rnd()*H,r:rnd()*1.1+0.25,a:rnd()*0.5+0.15,par:rnd()*0.5+0.2,tw:rnd()*TWO_PI,sp:rnd()*1.5+0.4});}

  const SEG=240;
  let startT=0,rafId=null;

  function fillBg(){
    if(customBgEl.checked){ctx.fillStyle=bgcolorEl.value;ctx.fillRect(0,0,W,H);return;}
    const th=theme(),top=hexRGB(th.bgTop),bot=hexRGB(th.bgBot);
    let bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,rgba(top,1));bg.addColorStop(1,rgba(bot,1));
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  }
  function background(now){
    fillBg();
    const th=theme();
    if(customBgEl.checked)return;
    if(th.nebula){ctx.save();ctx.globalCompositeOperation='lighter';
      for(const[bx,by,col,al] of [[W*0.7,H*0.35,'#ff6a22',0.10],[W*0.25,H*0.7,'#6f3fa1',0.08]]){
        let n=ctx.createRadialGradient(bx,by,0,bx,by,Math.max(W,H)*0.5);
        n.addColorStop(0,rgba(hexRGB(col),al));n.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=n;ctx.fillRect(0,0,W,H);}
      ctx.restore();}
    if(th.stars&&starsEl.checked){const drift=(now/1000)*8;ctx.save();ctx.globalCompositeOperation='lighter';
      for(const s of stars){const x=((s.x-drift*s.par)%W+W)%W;const tw=0.6+0.4*Math.sin(now/1000*s.sp+s.tw);
        ctx.fillStyle=rgba([220,228,245],s.a*tw);ctx.beginPath();ctx.arc(x,s.y,s.r,0,TWO_PI);ctx.fill();}
      ctx.restore();}
  }

  function drawBody(vp,persp,roll){
    if(!bodyEl.checked||theme().flat)return;
    const p=project(vp,0,0,0,persp,roll);const r=BODY*p.sf;
    let g=ctx.createRadialGradient(p.x-r*0.22,p.y-r*0.22,r*0.1,p.x,p.y,r);
    g.addColorStop(0,rgba([214,214,208],1));g.addColorStop(0.65,rgba([150,150,146],1));g.addColorStop(1,rgba([70,70,68],1));

  function strokeOrbit(el,alpha,vp,roll,nuEnd){
    ctx.strokeStyle=rgba(hexRGB(lineHex()),alpha);
    ctx.lineWidth=parseFloat(lwEl.value)*(H/620);ctx.lineCap='round';ctx.lineJoin='round';
    const end=nuEnd!=null?nuEnd:TWO_PI;
    const steps=nuEnd!=null?Math.max(2,Math.ceil(SEG*Math.abs(end)/TWO_PI)):SEG;
    const occ=occludeEl.checked;let drawing=false;
    for(let k=0;k<=steps;k++){
      const nu=nuEnd!=null?(k/steps)*end:nuFromFrac(k/steps,el.e);
      const w=keplerPt(el.a,el.e,el.inc,el.Om,el.w,nu,vp.psi);
      const vis=!(occ&&hidden(w.X,w.Y,w.Z));
      const p=project(vp,w.X,w.Y,w.Z,0,roll);
      if(vis){if(!drawing){ctx.beginPath();ctx.moveTo(p.x,p.y);drawing=true;}else ctx.lineTo(p.x,p.y);}
      else if(drawing){ctx.stroke();drawing=false;}
    }

  }

  function orbitSubpaths(el,vp,roll){
    const occ=occludeEl.checked;const out=[];let cur='';
    for(let k=0;k<=SEG;k++){
      const nu=nuFromFrac(k/SEG,el.e);
      const w=keplerPt(el.a,el.e,el.inc,el.Om,el.w,nu,vp.psi);
      const vis=!(occ&&hidden(w.X,w.Y,w.Z));
      const p=project(vp,w.X,w.Y,w.Z,0,roll);
      if(vis){cur+=(cur===''?'M':'L')+p.x.toFixed(2)+' '+p.y.toFixed(2)+' ';}
      else if(cur){out.push(cur.trim());cur='';}
    }
    if(cur)out.push(cur.trim());
    return out;
  }

  function drawSat(el,nu,alpha,vp,persp,roll){
    const th=theme();const w=keplerPt(el.a,el.e,el.inc,el.Om,el.w,nu,vp.psi);
    if(occludeEl.checked&&hidden(w.X,w.Y,w.Z))return;
    const p=project(vp,w.X,w.Y,w.Z,persp,roll);
    const glow=hexRGB(th.satGlow),core=hexRGB(th.satCore);
    ctx.save();if(th.glow)ctx.globalCompositeOperation='lighter';
    const R=Math.max(3,0.03*p.sf);
    let gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,R);
    gr.addColorStop(0,rgba(glow,0.45*alpha));gr.addColorStop(0.4,rgba(glow,0.16*alpha));gr.addColorStop(1,'rgba(0,0,0,0)');

    ctx.fillStyle=rgba(core,0.9*alpha);ctx.beginPath();ctx.arc(p.x,p.y,Math.max(1,0.006*p.sf),0,TWO_PI);ctx.fill();
  }

  function vignette(){if(customBgEl.checked||theme().flat)return;
    let v=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.72);
    v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.45)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);}

  function wordmarkRect(){const w=(parseFloat(wmSizeEl.value)/100)*W;return {w,h:w*WM_ASPECT};}
  function drawWordmark(){
    if(!wmOnEl.checked)return;
    const img=theme().flat?wmImgBlk:wmImgWht;
    if(!img.complete||!img.naturalWidth)return;
    if(!wmInit){wmX=W/2;wmY=H/2;wmInit=true;}
    const {w,h}=wordmarkRect();

  }

  function orbitWall(globalWall,k,N){

  // bounding box of the full mark (all orbits) in screen px — the alignment anchor
  function markBounds(vp,roll,P){
    let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;const N=Math.max(1,Math.round(P.num)),ST=40;
    for(let k=0;k<N;k++){const el=elements(k,N,P);
      for(let i=0;i<=ST;i++){const w=keplerPt(el.a,el.e,el.inc,el.Om,el.w,nuFromFrac(i/ST,el.e),vp.psi);
        const p=project(vp,w.X,w.Y,w.Z,0,roll);
        if(p.x<minx)minx=p.x;if(p.x>maxx)maxx=p.x;if(p.y<miny)miny=p.y;if(p.y>maxy)maxy=p.y;}}

  function drawGuides(){
    if(exporting||document.body.classList.contains('rec'))return;
    if(guidesEl.checked){
      ctx.save();ctx.lineWidth=1;
      ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.beginPath();   // fine grid (eighths)
      for(let i=1;i<8;i++){const x=W*i/8;ctx.moveTo(x,0);ctx.lineTo(x,H);}
      for(let i=1;i<8;i++){const y=H*i/8;ctx.moveTo(0,y);ctx.lineTo(W,y);}
      ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.10)';ctx.beginPath();   // thirds
      for(const fr of [1/3,2/3]){ctx.moveTo(W*fr,0);ctx.lineTo(W*fr,H);ctx.moveTo(0,H*fr);ctx.lineTo(W,H*fr);}
      ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.20)';ctx.beginPath();   // centre cross

      if(markBox){ctx.strokeStyle='rgba(120,180,255,0.55)';ctx.setLineDash([4,4]);   // mark bbox

      if(snapX!=null){ctx.beginPath();ctx.moveTo(snapX,0);ctx.lineTo(snapX,H);ctx.stroke();}
      if(snapY!=null){ctx.beginPath();ctx.moveTo(0,snapY);ctx.lineTo(W,snapY);ctx.stroke();}
      ctx.restore();
    }
  }

  // draw the whole constellation for a params object P at opacity alpha
  function drawConstellation(P,alpha,vp,roll,opts){
    opts=opts||{};
    const N=Math.max(1,Math.round(P.num));
    const reveal=opts.reveal!=null?opts.reveal:1, dir=opts.dir||1, tsec=opts.tsec||0, dur=opts.dur||1;
    for(let k=0;k<N;k++){
      const el=elements(k,N,P);
      const lw=reveal>=1?1:orbitWall(reveal,k,N);
      if(lw<=0)continue;
      if(lw<1){
        const nu=trueAnom(TWO_PI*lw,el.e)*dir;
        strokeOrbit(el,alpha,vp,roll,nu);
        if(opts.showSat) drawSat(el,nu,alpha,vp,0,roll);
      }else{
        strokeOrbit(el,alpha,vp,roll,null);
        if(opts.showSat&&opts.fly){const per=dur*Math.pow(el.a/A,1.5);const M=(dir*TWO_PI*(tsec/per))%TWO_PI;drawSat(el,trueAnom(M,el.e),alpha,vp,0,roll);}

    }
  }
  function drawFocus(vp,roll){
    if(!focusEl.checked||exporting)return;

    ctx.beginPath();ctx.moveTo(p.x-s,p.y);ctx.lineTo(p.x+s,p.y);ctx.moveTo(p.x,p.y-s);ctx.lineTo(p.x,p.y+s);ctx.stroke();
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,TWO_PI);ctx.stroke();ctx.restore();
  }

  // ---- mission sequence ----
  const SEQ_BASE={num:1,raans:29,apod:180,apos:78,sizespread:0,raanbias:0,incbias:0};
  const _kf=(label,o,leg)=>({label,legPhases:leg||0,p:Object.assign({},SEQ_BASE,o)});
  const SEQ_PRESETS={
    // leg phase counts reflect where burns happen: many during apogee-raising, ~1 across the coast, a few circularising
    "Earth Departure (LEO → TLI)":[_kf('LEO Parking',{ecc:0.01,incs:28.5},8),_kf('TLI Injection',{ecc:0.97,incs:47},0)],
    "Lunar Arrival (TLI → orbit)":[_kf('TLI Injection',{ecc:0.97,incs:47},1),_kf('Lunar Capture',{ecc:0.40,incs:28,size:0.7},3),_kf('Lunar Orbit',{ecc:0.10,incs:18,size:0.42},0)],
    "Full arc: LEO → Lunar":[_kf('LEO Parking',{ecc:0.01,incs:28.5},8),_kf('TLI Injection',{ecc:0.97,incs:47},1),_kf('Lunar Capture',{ecc:0.40,incs:28,size:0.7},3),_kf('Lunar Orbit',{ecc:0.10,incs:18,size:0.42},0)],
  };
  let keyframes=[], seqFrac=0;
  function seqActive(){return seqModeEl.checked && keyframes.length>=2;}
  function seqDisplay(){return $('seqlayer').checked?'layered':'animated';}
  function seqCycle(){return keyframes.length*(parseFloat($('seqdwell').value)+parseFloat($('seqtrans').value));}
  function seqParamsAtFrac(f){
    const n=keyframes.length, dwell=parseFloat($('seqdwell').value), trans=parseFloat($('seqtrans').value);
    let t=(((f%1)+1)%1)*n*(dwell+trans);
    for(let i=0;i<n;i++){
      if(t<dwell) return keyframes[i].p;
      t-=dwell;
      if(t<trans) return lerpParams(keyframes[i].p, keyframes[(i+1)%n].p, t/trans);
      t-=trans;
    }
    return keyframes[n-1].p;
  }
  // milestones + per-leg interpolated orbits (each keyframe's legPhases = orbits on the leg leaving it)
  function expandedKeyframes(){
    if(keyframes.length<2) return keyframes.map(k=>k.p);
    const out=[];
    for(let i=0;i<keyframes.length-1;i++){
      const a=keyframes[i].p, b=keyframes[i+1].p;
      const ph=Math.max(0,Math.round(keyframes[i].legPhases||0)), steps=ph+1;
      for(let s=0;s<steps;s++) out.push(lerpParams(a,b,s/steps));
    }
    out.push(keyframes[keyframes.length-1].p);
    return out;
  }
  function currentLayers(){
    if(seqActive()){
      if(seqDisplay()==='layered'){const ps=expandedKeyframes(),n=ps.length;return ps.map((p,i)=>({p,alpha:1-0.72*(n>1?i/(n-1):0)}));}
      return [{p:seqParamsAtFrac(seqFrac),alpha:1}];
    }
    return [{p:readParams(),alpha:1}];
  }

  // draw one frame. wallO!=null forces a specific reveal progress (used by GIF export).
  function drawScene(now,wallO){
    if(wallO==null && !startT)startT=now;
    const dur=parseFloat(durEl.value);
    const roll=parseFloat(rollEl.value)*D2R;
    BODY=parseFloat(bodysizeEl.value);
    const dir=retroEl.checked?-1:1;                 // retrograde flips travel direction
    const vp=viewParams();vp.psi=parseFloat(psiEl.value)*D2R;
    const tsec=wallO!=null?wallO*dur:(now-startT)/1000;

    ctx.setTransform(DPR,0,0,DPR,0,0);

    if(seqActive()){
      if(seqDisplay()==='animated')
        seqFrac = wallO!=null ? wallO : (seqCycle()>0 ? ((now-startT)/1000)/seqCycle() : 0);
      background(wallO!=null?tsec*1000:now);
      drawBody(vp,0,roll);
      const layers=currentLayers();
      for(const L of layers) drawConstellation(L.p,L.alpha,vp,roll,{reveal:1});
      if(!exporting)markBox=markBounds(vp,roll,layers[0].p);
      drawFocus(vp,roll);vignette();drawWordmark();drawGuides();
      return 1;
    }

    const wall=Math.min(wallO!=null?wallO:tsec/dur,1);
    const P=readParams();
    if(!exporting)markBox=markBounds(vp,roll,P);
    background(wallO!=null?tsec*1000:now);
    drawBody(vp,0,roll);
    drawConstellation(P,1,vp,roll,{reveal:wall,showSat:satEl.checked,fly:flyEl.checked,tsec,dur,dir});
    drawFocus(vp,roll);vignette();drawWordmark();drawGuides();
    if(wall>=1&&loopEl.checked)startT=now;
    return wall;
  }
  function frame(now){
    const wall=drawScene(now);
    if(wall>=1&&loopEl.checked)startT=now;
    rafId=requestAnimationFrame(frame);
  }
  function restart(){startT=0;if(rafId)cancelAnimationFrame(rafId);rafId=requestAnimationFrame(frame);}

  // ---------- export ----------
  function exportDims(){
    const res=parseInt(resEl.value,10)||Math.round(Math.max(W,H));
    const ar=W/H;
    return ar>=1 ? {tw:res, th:Math.round(res/ar)} : {tw:Math.round(res*ar), th:res};
  }
  function drawStatic(transparent){
    BODY=parseFloat(bodysizeEl.value);
    const roll=parseFloat(rollEl.value)*D2R;
    const vp=viewParams();vp.psi=parseFloat(psiEl.value)*D2R;
    if(!transparent) fillBg();
    drawBody(vp,0,roll);
    for(const L of currentLayers()) drawConstellation(L.p,L.alpha,vp,roll,{reveal:1});
    drawWordmark();
  }
  function exportPNG(){
    const {tw,th}=exportDims(), transparent=transparentEl.checked;
    const oc=document.createElement('canvas');oc.width=tw;oc.height=th;
    const octx=oc.getContext('2d');
    const sav={ctx,W,H,DPR,panX,panY,wmX,wmY};
    const f=th/H;
    ctx=octx;DPR=1;W=tw;H=th;panX*=f;panY*=f;wmX*=f;wmY*=f;
    ctx.setTransform(1,0,0,1,0,0);
    drawStatic(transparent);
    const data=oc.toDataURL('image/png');
    ctx=sav.ctx;W=sav.W;H=sav.H;DPR=sav.DPR;panX=sav.panX;panY=sav.panY;wmX=sav.wmX;wmY=sav.wmY;
    download(data,'p78-orbit.png');
  }
  function exportSVG(){
    BODY=parseFloat(bodysizeEl.value);
    const N=parseInt(numEl.value,10), roll=parseFloat(rollEl.value)*D2R, th=theme(), transparent=transparentEl.checked;
    const vp=viewParams(); vp.psi=parseFloat(psiEl.value)*D2R;
    const lwpx=(parseFloat(lwEl.value)*(H/620)).toFixed(2);
    let content='';
    currentLayers().forEach((L,li)=>{
      const Nk=Math.max(1,Math.round(L.p.num));let groups='';
      for(let k=0;k<Nk;k++){let d='';for(const sp of orbitSubpaths(elements(k,Nk,L.p),vp,roll)) d+=`<path d="${sp}"/>`;groups+=`<g id="l${li+1}-orbit-${k+1}">${d}</g>`;}
      content+=`<g id="layer-${li+1}" opacity="${L.alpha.toFixed(3)}" fill="none" stroke="${lineHex()}" stroke-width="${lwpx}" stroke-linecap="round" stroke-linejoin="round">${groups}</g>`;
    });
    let body='';
    if(bodyEl.checked&&!th.flat){const p=project(vp,0,0,0,0,roll);
      body=`<circle id="body" cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="${(BODY*p.sf).toFixed(2)}" fill="#9a9a96"/>`;}
    let wm='';
    if(wmOnEl.checked){const txt=th.flat?wmTextBlk:wmTextWht;
      if(txt){const {w,h}=wordmarkRect();const b64=btoa(unescape(encodeURIComponent(txt)));
        wm=`<image id="wordmark" x="${(wmX-w/2).toFixed(2)}" y="${(wmY-h/2).toFixed(2)}" width="${w.toFixed(2)}" height="${h.toFixed(2)}" href="data:image/svg+xml;base64,${b64}"/>`;}}
    const Wi=Math.round(W),Hi=Math.round(H),dm=exportDims();
    const bg=transparent?'':`<rect width="${Wi}" height="${Hi}" fill="${customBgEl.checked?bgcolorEl.value:th.bgBot}"/>`;
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${Wi} ${Hi}" width="${dm.tw}" height="${dm.th}">`
      +bg+content+body+wm+`</svg>`;
    const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
    download(url,'p78-orbit.svg');setTimeout(()=>URL.revokeObjectURL(url),1500);
  }
  function download(href,name){const a=document.createElement('a');a.href=href;a.download=name;a.click();}

  // record the reveal to video (MP4 if supported, else WebM) — full display quality
  function bestVideoMime(){
    const opts=['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
    for(const m of opts) if(window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(m)) return m;
    return '';
  }
  function exportVideo(){
    const mime=bestVideoMime();

    const btn=$('exportvid'),orig=btn.textContent;

    const stream=canvas.captureStream(fps);
    let rec;try{rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:16000000});}catch(e){rec=new MediaRecorder(stream);}
    const chunks=[];rec.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data);};
    const wasLoop=loopEl.checked;loopEl.checked=false;exporting=true;   // exporting hides guides
    rec.onstop=()=>{loopEl.checked=wasLoop;exporting=false;btn.textContent=orig;btn.disabled=false;
      const blob=new Blob(chunks,{type:mime}), ext=mime.indexOf('mp4')>=0?'mp4':'webm';
      const url=URL.createObjectURL(blob);download(url,'p78-orbit.'+ext);setTimeout(()=>URL.revokeObjectURL(url),3000);};
    restart();rec.start();

  }

  // animated GIF of the reveal (then a short hold), looping

    const frames=Math.max(2,Math.round(dur*fps)), hold=Math.round(0.9*fps), delay=Math.round(1000/fps);
    const oc=document.createElement('canvas');oc.width=tw;oc.height=th;const octx=oc.getContext('2d');
    const sav={ctx,W,H,DPR,panX,panY,wmX,wmY,startT};

  // ---------- state: presets + share ----------
  function getState(){
    const s={r:{},c:{}};
    RANGE.forEach(c=>s.r[c.id]=$(c.id).value);
    CHECKS.forEach(id=>s.c[id]=$(id).checked?1:0);
    s.theme=themeKey;s.bg=bgcolorEl.value;s.line=linecolorEl.value;s.aspect=aspectEl.value;
    s.pan=[Math.round(panX),Math.round(panY)];s.zoom=+zoom.toFixed(3);
    s.wmp=[Math.round(wmX),Math.round(wmY)];s.wmi=wmInit?1:0;
    s.seq={on:$('seqmode').checked?1:0,disp:$('seqlayer').checked?'layered':'animated',kf:keyframes};
    return s;
  }
  function setState(s){
    if(!s)return;
    if(s.r)RANGE.forEach(c=>{if(s.r[c.id]!=null)setRange(c.id,s.r[c.id]);});
    if(s.c)CHECKS.forEach(id=>{if(s.c[id]!=null)$(id).checked=!!s.c[id];});
    if(s.theme&&THEMES[s.theme]){themeKey=s.theme;updateThemeBtn();}
    if(s.bg)bgcolorEl.value=s.bg;
    if(s.line)linecolorEl.value=s.line;
    if(s.aspect){aspectEl.value=s.aspect;}
    if(s.zoom!=null)setRange('scale',s.zoom);
    if(s.pan){panX=+s.pan[0];panY=+s.pan[1];}
    if(s.wmp){wmX=+s.wmp[0];wmY=+s.wmp[1];}
    if(s.wmi!=null)wmInit=!!s.wmi;
    if(s.seq){keyframes=(s.seq.kf||[]).map(k=>({label:k.label,legPhases:k.legPhases||0,p:Object.assign({},k.p)}));renderKeyframes();
      $('seqmode').checked=!!s.seq.on; if(s.seq.disp==='layered')$('seqlayer').checked=true; else $('seqanim').checked=true;}
    resize();restart();
  }
  const enc=o=>btoa(unescape(encodeURIComponent(JSON.stringify(o))));

  const BUILTIN_GROUPS=[
    ["Earth-Moon Transfer",{
      "Transfer Orbit":     {num:2, ecc:0.97,incs:52,raans:29,apod:180,apos:78,sizespread:0.2},
      "TLI Departure":      {num:29,ecc:0.97,incs:64,  raans:29,apod:180,apos:78,sizespread:0.5},
      "Lunar Orbit":        {num:29,ecc:0.17,incs:18,  raans:29,apod:180,apos:78,sizespread:0.5},
    }],
    ["Presets",{
      "TLI Fan ★":     {num:29,ecc:0.97,incs:47,  raans:29,apod:180,apos:55,sizespread:0,raanbias:0,incbias:0.35},
      "Moon around Earth":{num:29,ecc:0.055,incs:24,raans:340,apod:180,apos:8,sizespread:0,raanbias:0,incbias:0},
      "Satellites around Moon":{num:29,ecc:0.05,incs:72,raans:180,apod:180,apos:6,sizespread:0,raanbias:0,incbias:0},
      "Lunar Stack":   {num:7, ecc:0.97,incs:29,  raans:7, apod:180,apos:78,sizespread:0},
      "Matariki":      {num:7, ecc:0.29,incs:7,   raans:29,apod:180,apos:78,sizespread:0},
      "HTP-90":        {num:90,ecc:0.90,incs:39,  raans:90,apod:180,apos:78,sizespread:0},
      "HTP-98":        {num:98,ecc:0.98,incs:39,  raans:98,apod:180,apos:78,sizespread:0},
      "Cislunar Gate": {num:5, ecc:0.78,incs:28.5,raans:29,apod:90, apos:78,sizespread:0.5},
    }],
  ];
  const BUILTIN=Object.assign({},...BUILTIN_GROUPS.map(g=>g[1]));
  const PKEY='p78-presets';
  const esc=s=>s.replace(/[<>&"]/g,'');
  function loadPresets(){try{return JSON.parse(localStorage.getItem(PKEY)||'{}');}catch(e){return {};}}
  function savePresets(o){localStorage.setItem(PKEY,JSON.stringify(o));}
  function refreshPresetList(){
    let html='<option value="">— load preset —</option>';
    for(const [label,grp] of BUILTIN_GROUPS)
      html+=`<optgroup label="${label}">`+Object.keys(grp).map(n=>`<option value="b:${esc(n)}">${esc(n)}</option>`).join('')+'</optgroup>';
    const keys=Object.keys(loadPresets());
    if(keys.length)html+='<optgroup label="Saved">'+keys.map(n=>`<option value="u:${esc(n)}">${esc(n)}</option>`).join('')+'</optgroup>';
    $('psel').innerHTML=html;
  }

  // ---------- UI wiring ----------
  function updateThemeBtn(){$('theme').textContent="Theme: "+THEMES[themeKey].label;}
  $('theme').onclick=()=>{themeKey=THEME_ORDER[(THEME_ORDER.indexOf(themeKey)+1)%THEME_ORDER.length];updateThemeBtn();};
  $('replay').onclick=restart;
  aspectEl.onchange=()=>resize();

  function syncScale(){setRange('scale',+zoom.toFixed(2));}
  $('resetview').onclick=()=>{panX=0;panY=0;zoom=1;syncScale();};
  let dragging=false,lastX=0,lastY=0;
  canvas.style.cursor='grab';
  function hitWm(mx,my){if(!wmOnEl.checked||!wmInit)return false;const {w,h}=wordmarkRect();return Math.abs(mx-wmX)<=w/2&&Math.abs(my-wmY)<=h/2;}
  canvas.addEventListener('pointerdown',e=>{
    const rect=canvas.getBoundingClientRect();
    if(hitWm(e.clientX-rect.left,e.clientY-rect.top))draggingWm=true;else dragging=true;
    lastX=e.clientX;lastY=e.clientY;canvas.style.cursor='grabbing';canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove',e=>{
    const dx=e.clientX-lastX,dy=e.clientY-lastY;
    if(draggingWm){
      wmX+=dx;wmY+=dy;snapX=snapY=null;const SNAP=8;
      if(markBox){
        for(const tx of [markBox.cx,W/2]) if(Math.abs(wmX-tx)<SNAP){wmX=tx;snapX=tx;break;}
        for(const ty of [markBox.cy,H/2]) if(Math.abs(wmY-ty)<SNAP){wmY=ty;snapY=ty;break;}
      }
    }else if(dragging){panX+=dx;panY+=dy;}else return;
    lastX=e.clientX;lastY=e.clientY;
  });
  const endDrag=()=>{dragging=false;draggingWm=false;snapX=snapY=null;canvas.style.cursor='grab';};
  canvas.addEventListener('pointerup',endDrag);canvas.addEventListener('pointercancel',endDrag);
  canvas.addEventListener('wheel',e=>{e.preventDefault();
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top, sx=W*0.5+panX, sy=H*0.5+panY;
    const nz=Math.min(5,Math.max(0.2,zoom*Math.exp(-e.deltaY*0.0015))), r=nz/zoom; zoom=nz;
    panX=(mx+(sx-mx)*r)-W*0.5; panY=(my+(sy-my)*r)-H*0.5;
    syncScale();
  },{passive:false});

  function lockup(pos){
    wmOnEl.checked=true;wmInit=true;
    const box=markBox||{cx:W/2,cy:H/2,minx:W/2,maxx:W/2,miny:H/2,maxy:H/2,h:H*0.4};
    const {w:ww,h:wh}=wordmarkRect(), clear=(parseFloat(clearEl.value)/100)*box.h;
    if(pos==='below'){wmX=box.cx;wmY=box.maxy+clear+wh/2;}
    else if(pos==='above'){wmX=box.cx;wmY=box.miny-clear-wh/2;}
    else if(pos==='right'){wmX=box.maxx+clear+ww/2;wmY=box.cy;}
    else {wmX=box.cx;wmY=box.cy;}
  }
  $('lk-free').onclick=()=>lockup('free');
  $('lk-below').onclick=()=>lockup('below');
  $('lk-right').onclick=()=>lockup('right');
  $('lk-above').onclick=()=>lockup('above');

  $('export').onclick=exportPNG;
  $('exportsvg').onclick=exportSVG;
  $('exportgif').onclick=exportGIF;
  $('exportvid').onclick=exportVideo;

  $('psave').onclick=()=>{const n=$('pname').value.trim();if(!n)return;const o=loadPresets();o[n]=getState();savePresets(o);refreshPresetList();$('psel').value='u:'+n;};
  $('psel').onchange=()=>{const v=$('psel').value;if(!v)return;
    if(v.startsWith('b:')){const p=BUILTIN[v.slice(2)];if(p)setState({r:p});}
    else if(v.startsWith('u:')){const s=loadPresets()[v.slice(2)];if(s)setState(s);}};
  $('pdel').onclick=()=>{const v=$('psel').value;if(!v.startsWith('u:'))return;const o=loadPresets();delete o[v.slice(2)];savePresets(o);refreshPresetList();};
  $('copylink').onclick=()=>{const u=shareURL();history.replaceState(null,'',u);
    const done=()=>{const b=$('copylink');const t=b.textContent;b.textContent='✓ Copied';setTimeout(()=>b.textContent=t,1200);};
    if(navigator.clipboard)navigator.clipboard.writeText(u).then(done).catch(()=>window.prompt('Copy link:',u));
    else window.prompt('Copy link:',u);};

  // ---- mission sequence wiring ----
  const seqModeEl=$('seqmode');
  function renderKeyframes(){
    const list=$('kf-list');list.innerHTML='';
    keyframes.forEach((kfm,i)=>{
      const row=document.createElement('div');row.className='row';
      const lab=document.createElement('input');lab.type='text';lab.value=kfm.label;lab.style.flex='1';lab.style.minWidth='60px';
      lab.oninput=()=>{kfm.label=lab.value;};
      row.append(lab);
      if(i<keyframes.length-1){   // phases drawn on the leg leaving this keyframe
        const ph=document.createElement('input');ph.type='number';ph.className='num';ph.style.width='46px';
        ph.min=0;ph.max=24;ph.step=1;ph.value=kfm.legPhases||0;ph.title='orbits drawn on the leg to the next keyframe';
        ph.oninput=()=>{kfm.legPhases=parseInt(ph.value,10)||0;};
        row.append(ph);
      }
      const load=document.createElement('button');load.textContent='Load';load.title='Load into sliders';load.onclick=()=>loadParams(kfm.p);
      const cap=document.createElement('button');cap.textContent='Capture';cap.title='Overwrite from sliders';cap.onclick=()=>{kfm.p=readParams();};
      const del=document.createElement('button');del.textContent='✕';del.onclick=()=>{keyframes.splice(i,1);renderKeyframes();};
      row.append(load,cap,del);list.appendChild(row);
    });
  }
  function loadSeqPreset(name){const s=SEQ_PRESETS[name];if(!s)return;keyframes=s.map(k=>({label:k.label,p:Object.assign({},k.p)}));renderKeyframes();}
  $('seqpreset').innerHTML='<option value="">— pick —</option>'+Object.keys(SEQ_PRESETS).map(n=>`<option>${n}</option>`).join('');
  $('seqpreset').onchange=()=>{const n=$('seqpreset').value;if(n){loadSeqPreset(n);seqModeEl.checked=true;restart();}};
  seqModeEl.onchange=()=>{if(seqModeEl.checked&&keyframes.length<2)loadSeqPreset('Full arc: LEO → Lunar');restart();};
  $('seqanim').onchange=()=>restart();$('seqlayer').onchange=()=>restart();
  $('kf-add').onclick=()=>{if(keyframes.length>=8)return;keyframes.push({label:'KF '+(keyframes.length+1),legPhases:4,p:readParams()});renderKeyframes();};
  renderKeyframes();

  const recBtn=$('rec'),recExit=$('rec-exit');
  const toggleRec=on=>{document.body.classList.toggle('rec',on);requestAnimationFrame(resize);};
  recBtn.onclick=()=>toggleRec(true);recExit.onclick=()=>toggleRec(false);
  window.addEventListener('keydown',e=>{if(e.key==='Escape')toggleRec(false);});

  // ---------- go ----------
  updateThemeBtn();refreshPresetList();
  resize();
  if(!loadFromHash())restart();
})();
</script>
</body>
</html>
